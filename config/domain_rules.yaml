# BnK DeepAgent — Domain Rules (24 industry profiles)
# Edit this file to tune effort multipliers per domain.
# Loaded by tools/effort_ops.py at runtime.

# ════════════════════════════════════════════════════════════════════════════
# Schema for each domain:
#   multipliers:
#     be_multiplier:   float   # Backend effort × this
#     fe_multiplier:   float   # Frontend
#     ai_multiplier:   float   # AI/ML
#   ratios:
#     qc_pct:          float   # QC effort = dev × this
#     ba_pct:          float   # BA effort = dev × this
#     pm_pct:          float   # PM effort = (dev+ba+qc) × this
#   durations:
#     uat_weeks:       int
#     deploy_days_per_env: int
#     hypercare_weeks: int
#   buffers:
#     base_buffer_pct: int     # 10-30 (regulatory risk)
#     integration_overhead_md: float  # per integration
#   mandatory_tasks:
#     - id, category, md, role
#   default_deployment_env:    cloud | on_premise | hybrid
#   default_compliance:        list of standards
#   default_archs_recommended: list of architecture types
#   default_archs_avoided:     list
#   notes:                     human-readable summary
# ════════════════════════════════════════════════════════════════════════════

banking:
  multipliers: {be_multiplier: 1.30, fe_multiplier: 1.05, ai_multiplier: 1.20}
  ratios: {qc_pct: 0.40, ba_pct: 0.20, pm_pct: 0.10}
  durations: {uat_weeks: 4, deploy_days_per_env: 5, hypercare_weeks: 12}
  buffers: {base_buffer_pct: 20, integration_overhead_md: 1.0}
  mandatory_tasks:
    - {id: pen_test,        category: security, md: 5, role: be}
    - {id: cab_approval,    category: deploy,   md: 2, role: pm}
    - {id: compliance_doc,  category: doc,      md: 3, role: ba}
    - {id: dr_test,         category: deploy,   md: 3, role: be}
    - {id: audit_trail,     category: feature,  md: 5, role: be}
    - {id: sast,            category: security, md: 2, role: be}
    - {id: dast,            category: security, md: 2, role: be}
    - {id: vault_setup,     category: security, md: 3, role: be}
  default_deployment_env: on_premise
  default_compliance: [PCI-DSS, ISO 27001, SOC 2]
  default_archs_recommended: [microservices, modular_monolith]
  default_archs_avoided: [serverless]
  notes: "On-prem likely. Multi-round UAT (4 weeks). CAB approval gates each deploy. SIEM + Vault mandatory."

